# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c1e8ca3862d52e5ebe6d76b1ebbd78e8"
name = "learn"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://example.com/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "https://example.com/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_metaobjects,write_metaobjects,write_discounts"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

# Product Metafields - Phase 3
[product.metafields.custom.material]
type = "single_line_text_field"
name = "Material"
description = "What the product is made of"

  [product.metafields.custom.material.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[product.metafields.custom.care_instructions]
type = "multi_line_text_field"
name = "Care Instructions"
description = "How to care for this product"

  [product.metafields.custom.care_instructions.access]
  admin = "merchant_read_write"

[product.metafields.custom.rating]
type = "number_decimal"
name = "Rating"
description = "Product rating from 0 to 5"

  [product.metafields.custom.rating.access]
  admin = "merchant_read_write"
  storefront = "public_read"

# Product Metaobject References - Phase 4
# Note: To add author/size chart references to products:
# 1. Go to Shopify Admin > Settings > Custom data > Products
# 2. Add metafield with type "Reference" > "Metaobject"
# 3. Select the metaobject type (author or size_chart)
# Or use GraphQL API to create metafields programmatically

# Author Metaobject - Phase 3
[metaobjects.app.author]
name = "Author"
description = "Content authors for products"

  [metaobjects.app.author.access]
  admin = "merchant_read_write"

[metaobjects.app.author.fields.name]
name = "Name"
type = "single_line_text_field"
required = true

[metaobjects.app.author.fields.bio]
name = "Bio"
type = "multi_line_text_field"
required = false

[metaobjects.app.author.fields.avatar]
name = "Avatar"
type = "file_reference"
required = false

# Size Chart Metaobject - Phase 3
[metaobjects.app.size_chart]
name = "Size Chart"
description = "Reusable size charts for products"

  [metaobjects.app.size_chart.access]
  admin = "merchant_read_write"

[metaobjects.app.size_chart.fields.chart_name]
name = "Chart Name"
type = "single_line_text_field"
required = true

[metaobjects.app.size_chart.fields.chart_data]
name = "Chart Data"
type = "json"
required = false
